package:
  path: {{ path }}
  format: {{ format }}
  publish_driver: {{ driver }}
  recursive: true

repository_profile: {{ profile }}

repositories:
  internal-npm:
    provider: {{ provider }}
    organization: {{ org }}
    project: {{ project }}
    feed: {{ repository }}
    credential_ref: {{ credential }}

  # Nexus profile example (use a format-compatible hosted repository):
  # nexus-hosted:
  #   provider: nexus
  #   base_url: https://nexus.example.com
  #   repository: maven-hosted
  #   username: publisher
  #   credential_ref: NEXUS_PASSWORD

options:
  existing_package_policy: SKIP_IDENTICAL
  timeout: 5m
  retry_count: 2
  dry_run: false
  parallelism: 10
  fail_fast: false

metadata:
  pipeline_id: ""
  build_id: ""
  commit_sha: ""
  correlation_id: ""
